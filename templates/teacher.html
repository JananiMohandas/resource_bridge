<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard - The Resource Bridge</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<header>
<div class="header-content">
<a href="/" class="logo">
<div class="logo-icon">RB</div>
<h1>The Resource Bridge</h1>
</a>
<div class="role-badge">👨‍🏫 Teacher</div>
</div>
</header>

<div class="container">

<!-- Alert Messages -->
<div id="alertContainer"></div>

<!-- Upload Resource Section -->
<div class="card">
<h2>📤 Upload New Resource</h2>
<form id="uploadForm">
<div class="form-group">
<label for="title">Title *</label>
<input type="text" id="title" name="title" required
placeholder="e.g., Week 4 Reading: Introduction to Machine Learning">
</div>

<div class="form-group">
<label for="description">Description</label>
<textarea id="description" name="description"
placeholder="Brief description of the resource..."></textarea>
</div>

<div class="form-group">
<label for="tags">Tags (comma-separated)</label>
<input type="text" id="tags" name="tags"
placeholder="e.g., Week 4, Machine Learning, Reading">
<div class="tag-input-hint">Add tags to make resources easier to find</div>
</div>

<div class="form-group">
<label for="uploaded_by">Your Name</label>
<input type="text" id="uploaded_by" name="uploaded_by"
placeholder="Your name (optional)">
</div>

<div class="form-group">
<label for="file">PDF File *</label>
<input type="file" id="file" name="file" accept=".pdf" required>
<div class="tag-input-hint">Maximum file size: 10MB</div>
</div>

<button type="submit" class="btn btn-primary" id="uploadBtn">
 Upload Resource
</button>
</form>
</div>

<!-- Uploaded Resources Section -->
<div class="card">
<h2>📚 Uploaded Resources</h2>
<div id="loadingResources" class="loading">
<div class="spinner"></div>
<p>Loading resources...</p>
</div>
<div id="resourcesContainer" class="hidden"></div>
</div>

<!-- ✅ NEW: Student Requests Section -->
<div class="card">
<h2>📌 Student Resource Requests</h2>
<div id="requestsContainer">
<p>Loading requests...</p>
</div>
</div>

</div>

<script src="{{ url_for('static', filename='js/teacher.js') }}"></script>
</body>
</html>
